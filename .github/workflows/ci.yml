name: Commit CI

on:
  workflow_dispatch:
  push:
    branches: [ main ]
  pull_request:

jobs:
  build:
    runs-on: ubuntu-22.04
    steps:
      - name: Fetch source code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          lfs: true

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: "temurin"
          java-version: "17"

      - name: Setup Android environment
        uses: android-actions/setup-android@v3

      - name: Install NDK & CMake
        run: |
          sdkmanager "platforms;android-36" "build-tools;36.1.0" "ndk;28.0.13004108" "cmake;3.31.6"

      - name: Install system dependencies (Ubuntu)
        run: |
          sudo apt update
          sudo apt install extra-cmake-modules gettext libboost-all-dev libzstd-dev

      - name: Ensure executable scripts
        run: |
          chmod +x ./prepare_personal_build.sh
          chmod +x ./gradlew

      - name: Prepare personal build sources
        run: |
          ./prepare_personal_build.sh

      - name: Setup Gradle
        uses: gradle/gradle-build-action@v3

      - name: Build fxRelease APK (arm64-v8a only, minified)
        run: ./gradlew :app:assembleFxRelease -PbuildABI=arm64-v8a

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: app-fx-release
          path: app/build/outputs/apk/fx/release/*.apk

      - name: Build rime plugin release (arm64-v8a, matches fx app ABI)
        run: ./gradlew :plugin:rime:assembleRelease -PbuildABI=arm64-v8a

      - name: Upload rime plugin APK
        uses: actions/upload-artifact@v4
        with:
          name: rime-plugin-release
          path: plugin/rime/build/outputs/apk/release/*.apk
